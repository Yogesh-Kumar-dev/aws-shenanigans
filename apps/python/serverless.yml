service: aws-automation
frameworkVersion: "4"
useDotenv: true

configValidationMode: error

custom:
  # Keep only the last 2 published Lambda versions; prune older ones after each deploy.
  prune:
    automatic: true
    number: 2
  stage: ${opt:stage, env:STAGE, 'dev'}
  region: ${opt:region, env:AWS_REGION, 'ap-south-2'}
  telegramParamPrefix: ${env:TELEGRAM_PARAM_PREFIX, '/automation/${self:custom.stage}/telegram'}
  pythonRequirements:
    dockerizePip: false
    slim: true
    strip: false
    useStaticCache: true
    useDownloadCache: true

provider:
  name: aws
  runtime: python3.12
  architecture: arm64
  stage: ${self:custom.stage}
  region: ${self:custom.region}
  memorySize: 128
  timeout: 30
  logRetentionInDays: 30
  versionFunctions: true
  deploymentMethod: direct
  deploymentPrefix: serverless
  environment:
    STAGE: ${self:custom.stage}
    LOG_LEVEL: ${env:LOG_LEVEL, 'INFO'}
    TELEGRAM_BOT_TOKEN_PARAM: ${env:TELEGRAM_BOT_TOKEN_PARAM, '${self:custom.telegramParamPrefix}/bot-token'}
    TELEGRAM_CHAT_ID_PARAM: ${env:TELEGRAM_CHAT_ID_PARAM, '${self:custom.telegramParamPrefix}/chat-id'}
    TELEGRAM_BOT_TOKEN: ${env:TELEGRAM_BOT_TOKEN, ''}
    TELEGRAM_CHAT_ID: ${env:TELEGRAM_CHAT_ID, ''}
    FREE_TIER_WARN_PERCENT: ${env:FREE_TIER_WARN_PERCENT, '10'}
    FREE_TIER_REPORT_MAX_ITEMS: ${env:FREE_TIER_REPORT_MAX_ITEMS, '3'}
    EC2_DOMAIN: ${env:EC2_DOMAIN, 'quickrecall-aws.duckdns.org'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogStream
            - logs:CreateLogGroup
            - logs:PutLogEvents
          Resource:
            - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:service}-${self:custom.stage}-*:*
        - Effect: Allow
          Action:
            - freetier:GetFreeTierUsage
          Resource: "*"
        - Effect: Allow
          Action:
            - ssm:GetParameter
          Resource:
            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${self:custom.telegramParamPrefix}/bot-token
            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${self:custom.telegramParamPrefix}/chat-id
        # Allow decrypting SecureString parameters via the SSM-managed KMS key only.
        - Effect: Allow
          Action:
            - kms:Decrypt
          Resource: "*"
          Condition:
            StringEquals:
              kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
        # Instance ID is resolved at runtime from the Elastic IP, so it can't
        # be scoped to a specific instance ARN at deploy time.
        - Effect: Allow
          Action:
            - ec2:DescribeInstances
            - ec2:StartInstances
            - ec2:StopInstances
          Resource: "*"

package:
  individually: true
  patterns:
    - "!**"

functions:
  budget-alert:
    handler: functions/budget_alert/handler.handle
    description: Sends a daily AWS Free Tier usage report to Telegram.
    package:
      patterns:
        - functions/budget_alert/**
    events:
      - schedule:
          name: ${self:service}-${self:custom.stage}-budget-alert-daily
          description: Daily AWS Free Tier usage Telegram report at 8:00 AM IST.
          rate: cron(30 2 * * ? *)
          enabled: true

  ec2-scheduler:
    handler: functions/ec2_scheduler/handler.handle
    description: Starts/stops the reserved EC2 instance on a daily schedule.
    package:
      patterns:
        - functions/ec2_scheduler/**
    events:
      - schedule:
          name: ${self:service}-${self:custom.stage}-ec2-start-daily
          description: Start EC2 instance at 8:00 AM IST.
          rate: cron(30 2 * * ? *)
          enabled: true
          input:
            action: start
      - schedule:
          name: ${self:service}-${self:custom.stage}-ec2-stop-daily
          description: Stop EC2 instance at 11:00 PM IST.
          rate: cron(30 17 * * ? *)
          enabled: true
          input:
            action: stop
